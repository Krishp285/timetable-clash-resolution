{% extends 'base.html' %}
{% block title %}Faculty Profile{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header">
        <h1 class="card-title">
            <i class="fas fa-user-edit"></i> Complete Your Profile
        </h1>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" value="{{ faculty.phone or '' }}" placeholder="+91 1234567890">
        </div>
        
        <div class="form-group">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control" value="{{ faculty.department or '' }}" placeholder="e.g., Computer Science">
        </div>
        
        <div class="form-group">
            <label class="form-label">Designation</label>
            <input type="text" name="designation" class="form-control" value="{{ faculty.designation or '' }}" placeholder="e.g., Professor, Assistant Professor">
        </div>
        
        <h3 style="margin: 2rem 0 1rem;"><i class="fas fa-clock"></i> Working Hours</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label">Start Time</label>
                <input type="time" name="start_time" class="form-control" value="{{ faculty.get_working_hours()['start'] if faculty.get_working_hours() else '09:00' }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">End Time</label>
                <input type="time" name="end_time" class="form-control" value="{{ faculty.get_working_hours()['end'] if faculty.get_working_hours() else '17:00' }}" required>
            </div>
        </div>
        
        <h3 style="margin: 2rem 0 1rem;"><i class="fas fa-book"></i> Subjects You Can Teach</h3>
        
        <div class="form-group">
            <label class="form-label">Enter subjects (comma-separated)</label>
            <textarea name="subjects" class="form-control" rows="4" placeholder="e.g., Data Structures, Algorithms, Database Management, Operating Systems" required>{{ faculty.get_subjects()|join(', ') if faculty.get_subjects() else '' }}</textarea>
            <small class="form-text">Separate multiple subjects with commas</small>
        </div>
        
        <div class="d-flex gap-2" style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Profile
            </button>
           <a href="{{ url_for('faculty_dashboard') }}" class="btn btn-secondary">

                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </form>
</div>

{% endblock %}
