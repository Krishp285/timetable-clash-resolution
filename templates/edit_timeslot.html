{% extends 'base.html' %}
{% block title %}Edit Time Slot{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <div class="card-header">
        <h1 class="card-title">
            <i class="fas fa-edit"></i> Edit Time Slot
        </h1>
    </div>

    <form method="POST" action="{{ url_for('update_timeslot', slot_id=slot.id) }}">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label">Start Time</label>
                <input type="time" name="start_time" class="form-control"
                       value="{{ slot.start_time.strftime('%H:%M') }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">End Time</label>
                <input type="time" name="end_time" class="form-control"
                       value="{{ slot.end_time.strftime('%H:%M') }}" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Label</label>
            <input type="text" name="slot_label" class="form-control"
                   value="{{ slot.slot_label or '' }}">
        </div>

        <div class="d-flex gap-2" style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Update
            </button>
            <a href="{{ url_for('manage_timeslots') }}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
